version: '3.8'

services:
  # ==============================================================================
  # KEYCLOAK SERVICE
  # ==============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: keycloak-mcp-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
      KC_FEATURES: preview
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mcp-network

  # ==============================================================================
  # MILVUS STANDALONE - Vector Database
  # ==============================================================================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mcp-network

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mcp-network

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mcp-network

  # ==============================================================================
  # MCP SERVER
  # ==============================================================================
  mcp-server:
    build: .
    container_name: keycloak-mcp-server
    depends_on:
      keycloak:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-master}
      - MCP_PORT=${MCP_PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Vector DB Configuration
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION_DOCS=keycloak_docs
      - MILVUS_COLLECTION_CODE=keycloak_code
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-384}
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    networks:
      - mcp-network

  # ==============================================================================
  # INDEXER SERVICE - For indexing docs and code
  # ==============================================================================
  indexer:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    container_name: keycloak-indexer
    depends_on:
      milvus:
        condition: service_healthy
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION_DOCS=keycloak_docs
      - MILVUS_COLLECTION_CODE=keycloak_code
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-384}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - KEYCLOAK_DOCS_URLS=https://www.keycloak.org/docs/latest/server_admin/index.html,https://www.keycloak.org/docs/latest/server_development/index.html,https://www.keycloak.org/docs/latest/authorization_services/index.html,https://www.keycloak.org/docs/latest/upgrading/index.html
      - KEYCLOAK_REPO_TAG=26.0.5
    volumes:
      - ./data:/app/data
      - indexer_cache:/app/cache
    networks:
      - mcp-network
    profiles:
      - indexer

networks:
  mcp-network:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  indexer_cache:
